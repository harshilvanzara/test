<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
<style>
    body {
        font-family: Arial;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .login-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 300px;
        box-shadow: 0 0 10px gray;
    }
    h2  {
        text-align: center;
    }
    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;     
    }
    button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: darkblue;
    }
    </style>
    </head>
    <body>
        <div class="login-box">
            <h2>Login</h2>
                <input type="text" id="username" placeholder="Enter Username">
                <input type="password" id="password" placeholder="Enter Password">

                <button onclick="login()">Login</button>
        </div>
        <script>
            function login() {
                let username = document.getElementById('username').value;
                let password = document.getElementById('password').value;

                if (username === "admin" && password === "1234") {
                    alert('Login successful!');
                } else {
                    alert('Invalid username or password');
                }
            }
        </script>  

    </body>
</html>
